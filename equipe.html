<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área da equipe - Rede Segura Galdino</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #1f2a44;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .topo {
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    .topo h1 {
      margin: 0 0 10px;
      color: #2563eb;
    }

    .topo p {
      margin: 0;
      color: #475569;
      line-height: 1.6;
    }

    .acoes {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .botao {
      display: inline-block;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .botao-primario {
      background: #2563eb;
      color: white;
    }

    .botao-primario:hover {
      background: #1d4ed8;
    }

    .botao-secundario {
      background: #e2e8f0;
      color: #1e293b;
    }

    .botao-secundario:hover {
      background: #cbd5e1;
    }

    .mensagem {
      margin: 18px 0;
      padding: 14px;
      border-radius: 12px;
      display: none;
      line-height: 1.5;
      font-size: 14px;
    }

    .mensagem.erro {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .lista {
      display: grid;
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
      border-left: 6px solid #2563eb;
    }

    .card h3 {
      margin: 0 0 12px;
      color: #1e3a8a;
      font-size: 20px;
    }

    .linha {
      margin-bottom: 8px;
      line-height: 1.6;
      color: #334155;
    }

    .label {
      font-weight: bold;
      color: #0f172a;
    }

    .vazio {
      background: white;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      color: #64748b;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
    }

    .carregando {
      text-align: center;
      color: #475569;
      padding: 24px;
    }

    @media (max-width: 640px) {
      .topo {
        padding: 22px;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <h1>Área da equipe</h1>
      <p>
        Visualização inicial dos relatos enviados pelo formulário da Rede Segura Galdino.
      </p>

      <div class="acoes">
        <button class="botao botao-primario" id="btnAtualizar">Atualizar relatos</button>
        <a class="botao botao-secundario" href="index.html">Voltar para o início</a>
      </div>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <div id="carregando" class="carregando">Carregando relatos...</div>
    <div id="listaRelatos" class="lista"></div>
  </div>
<script>
  const senhaEquipe = "equipe123";

  const senhaInformada = prompt("Área restrita da equipe. Digite a senha:");

  if (senhaInformada !== senhaEquipe) {
    alert("Acesso negado.");
    window.location.href = "index.html";
  }
</script>
  <script type="module"> 
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAkpxFTUX3sFJIm_nNlrusSUeikI15HK0M",
      authDomain: "studio-1530165856-a9693.firebaseapp.com",
      projectId: "studio-1530165856-a9693",
      storageBucket: "studio-1530165856-a9693.firebasestorage.app",
      messagingSenderId: "889720942642",
      appId: "1:889720942642:web:ae0fb66c78336637110c2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const listaRelatos = document.getElementById("listaRelatos");
    const carregando = document.getElementById("carregando");
    const mensagem = document.getElementById("mensagem");
    const btnAtualizar = document.getElementById("btnAtualizar");

    function formatarData(timestamp) {
      if (!timestamp || !timestamp.toDate) return "Data não disponível";
      return timestamp.toDate().toLocaleString("pt-BR");
    }

    function criarCard(relato) {
      const card = document.createElement("div");
      card.className = "card";

      const titulo = document.createElement("h3");
      titulo.textContent = relato.tipo || "Relato sem tipo informado";
      card.appendChild(titulo);

      const nome = document.createElement("div");
      nome.className = "linha";
      nome.innerHTML = `<span class="label">Nome:</span> ${relato.nome || "Não identificado"}`;
      card.appendChild(nome);

      const local = document.createElement("div");
      local.className = "linha";
      local.innerHTML = `<span class="label">Onde aconteceu:</span> ${relato.local || "Não informado"}`;
      card.appendChild(local);

    const tempo = document.createElement("div");
tempo.className = "linha";
tempo.innerHTML = `<span class="label">Quando aconteceu ou quando soube:</span> ${relato.tempo || "Não informado"}`;
card.appendChild(tempo);

const recorrencia = document.createElement("div");
recorrencia.className = "linha";
recorrencia.innerHTML = `<span class="label">Recorrência:</span> ${relato.recorrencia || "Não informado"}`;
card.appendChild(recorrencia);

      const status = document.createElement("div");
      status.className = "linha";
      status.innerHTML = `<span class="label">Status:</span> ${relato.status || "novo"}`;
      card.appendChild(status);

      const data = document.createElement("div");
      data.className = "linha";
      data.innerHTML = `<span class="label">Enviado em:</span> ${formatarData(relato.createdAt)}`;
      card.appendChild(data);

      return card;
    }

    async function carregarRelatos() {
      listaRelatos.innerHTML = "";
      mensagem.className = "mensagem";
      mensagem.style.display = "none";
      carregando.style.display = "block";
      carregando.textContent = "Carregando relatos...";

      try {
        const q = query(collection(db, "denuncias"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        carregando.style.display = "none";

        if (snapshot.empty) {
          listaRelatos.innerHTML = `<div class="vazio">Nenhum relato encontrado até o momento.</div>`;
          return;
        }

        snapshot.forEach((doc) => {
          const relato = doc.data();
          const card = criarCard(relato);
          listaRelatos.appendChild(card);
        });
      } catch (error) {
        console.error("Erro ao carregar relatos:", error);
        carregando.style.display = "none";
        mensagem.textContent = "Não foi possível carregar os relatos agora. Verifique as regras do Firestore.";
        mensagem.className = "mensagem erro";
        mensagem.style.display = "block";
      }
    }

    btnAtualizar.addEventListener("click", carregarRelatos);

    carregarRelatos();
  </script>
</body>
</html>
