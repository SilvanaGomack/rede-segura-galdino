<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fazer denúncia - Rede Segura Galdino</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #2d5bff;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #2d5bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1c3fd6;
    }

    .voltar {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #555;
      text-decoration: none;
    }

  </style>
</head>

<body>

<div class="container">
  <h1>Fazer denúncia</h1>

  <form>
    <label>Seu nome (opcional)</label>
    <input type="text">

    <label>Tipo de situação</label>
    <input type="text" placeholder="Bullying, cyberbullying, ameaça...">

    <label>Descreva o que aconteceu</label>
    <textarea rows="5"></textarea>

    <label>Anexar imagem (opcional)</label>
    <input type="file">

    <button type="submit">Enviar denúncia</button>
  </form>

  <a href="index.html" class="voltar">← Voltar para o início</a>

</div>

</body>
</html>
