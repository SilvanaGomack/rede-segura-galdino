<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaveta Restrita - Rede Segura Galdino</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #1f2a44;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .topo {
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    .topo h1 {
      margin: 0 0 10px;
      color: #2563eb;
    }

    .topo p {
      margin: 0;
      color: #475569;
      line-height: 1.6;
    }

    .acoes {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .botao {
      display: inline-block;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .botao-primario {
      background: #2563eb;
      color: white;
    }

    .botao-secundario {
      background: #e2e8f0;
      color: #1e293b;
    }

    .mensagem {
      margin: 18px 0;
      padding: 14px;
      border-radius: 12px;
      display: none;
      line-height: 1.5;
      font-size: 14px;
    }

    .mensagem.erro {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .lista {
      display: grid;
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
      border-left: 6px solid #7c3aed;
    }

    .card h3 {
      margin: 0 0 12px;
      color: #4c1d95;
      font-size: 20px;
    }

    .linha {
      margin-bottom: 8px;
      line-height: 1.6;
      color: #334155;
    }

    .label {
      font-weight: bold;
      color: #0f172a;
    }

    .vazio {
      background: white;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      color: #64748b;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
    }

    .carregando {
      text-align: center;
      color: #475569;
      padding: 24px;
    }

    .link-prova {
      display: inline-block;
      margin-top: 8px;
      color: #2563eb;
      font-weight: bold;
      text-decoration: none;
    }

    .link-prova:hover {
      text-decoration: underline;
    }

    #bloqueioGaveta {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .caixa-senha {
      background: white;
      width: 90%;
      max-width: 420px;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .caixa-senha h2 {
      margin-top: 0;
      color: #2563eb;
    }

    .caixa-senha p {
      color: #475569;
      line-height: 1.5;
    }

    .caixa-senha input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      margin-top: 10px;
      margin-bottom: 12px;
    }

    .erro-senha {
      color: red;
      display: none;
      margin-top: 10px;
    }

    @media (max-width: 640px) {
      .topo {
        padding: 22px;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="bloqueioGaveta">
    <div class="caixa-senha">
      <h2>Gaveta restrita</h2>
      <p>Área confidencial da direção e equipe pedagógica. Digite a senha para acessar.</p>
      <input type="password" id="senhaGavetaInput" placeholder="Digite a senha">
      <button id="btnEntrarGaveta" class="botao botao-primario">Entrar</button>
      <p id="erroSenhaGaveta" class="erro-senha">Senha incorreta</p>
    </div>
  </div>

  <div class="container">
    <div class="topo">
      <h1>Gaveta Restrita</h1>
      <p>Visualização confidencial dos relatos enviados, incluindo informações sensíveis, links e observações completas.</p>
      <div class="acoes">
        <a href="equipe.html" class="botao botao-secundario">Voltar para a área da equipe</a>
      </div>
    </div>

    <div id="mensagem" class="mensagem"></div>
    <div id="carregando" class="carregando">Carregando relatos...</div>
    <div id="listaRelatos" class="lista"></div>
  </div>

  <script>
    const senhaGavetaCorreta = "gaveta123";

    function liberarGaveta() {
      document.getElementById("bloqueioGaveta").style.display = "none";
    }

    function validarSenhaGaveta() {
      const senha = document.getElementById("senhaGavetaInput").value;
      const erro = document.getElementById("erroSenhaGaveta");

      if (senha === senhaGavetaCorreta) {
        liberarGaveta();
      } else {
        erro.style.display = "block";
      }
    }

    document.getElementById("btnEntrarGaveta").addEventListener("click", validarSenhaGaveta);
    document.getElementById("senhaGavetaInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        validarSenhaGaveta();
      }
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAkpxFTUX3sFJIm_nN1rusSUeikI15HK0M",
      authDomain: "studio-1530165856-a9693.firebaseapp.com",
      projectId: "studio-1530165856-a9693",
      storageBucket: "studio-1530165856-a9693.firebasestorage.app",
      messagingSenderId: "889720942642",
      appId: "1:889720942642:web:ae0fb66c78336637110c2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const listaRelatos = document.getElementById("listaRelatos");
    const carregando = document.getElementById("carregando");
    const mensagem = document.getElementById("mensagem");

    function formatarData(timestamp) {
      if (!timestamp || !timestamp.toDate) return "Data não disponível";
      return timestamp.toDate().toLocaleString("pt-BR");
    }

    function criarLinha(label, valor) {
      const div = document.createElement("div");
      div.className = "linha";
      div.innerHTML = `<span class="label">${label}:</span> ${valor || "Não informado"}`;
      return div;
    }

    function criarCard(relato) {
      const card = document.createElement("div");
      card.className = "card";

      const titulo = document.createElement("h3");
      titulo.textContent = relato.tipo || "Relato sem tipo informado";
      card.appendChild(titulo);

      card.appendChild(criarLinha("Nome", relato.nome));
      card.appendChild(criarLinha("Contato", relato.contato));
      card.appendChild(criarLinha("Onde aconteceu", relato.local));
      card.appendChild(criarLinha("Quando aconteceu ou quando soube", relato.tempo));
      card.appendChild(criarLinha("Recorrência", relato.recorrencia));
      card.appendChild(criarLinha("Descrição", relato.descricao));
      card.appendChild(criarLinha("Status", relato.status));
      card.appendChild(criarLinha("Enviado em", formatarData(relato.createdAt)));

      if (relato.link) {
        const link = document.createElement("a");
        link.href = relato.link;
        link.target = "_blank";
        link.className = "link-prova";
        link.textContent = "Abrir link da prova";
        card.appendChild(link);
      }

      return card;
    }

    async function carregarRelatos() {
      listaRelatos.innerHTML = "";
      mensagem.className = "mensagem";
      mensagem.style.display = "none";
      carregando.style.display = "block";

      try {
        const q = query(collection(db, "denuncias"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        carregando.style.display = "none";

        if (snapshot.empty) {
          listaRelatos.innerHTML = `<div class="vazio">Nenhum relato encontrado até o momento.</div>`;
          return;
        }

        snapshot.forEach((documento) => {
          const relato = documento.data();
          const card = criarCard(relato);
          listaRelatos.appendChild(card);
        });

      } catch (error) {
        console.error("Erro ao carregar relatos:", error);
        carregando.style.display = "none";
        mensagem.textContent = "Não foi possível carregar os relatos agora.";
        mensagem.className = "mensagem erro";
        mensagem.style.display = "block";
      }
    }

    carregarRelatos();
  </script>
</body>
</html>
